apiVersion: apps/v1
kind: Deployment
metadata:
  name: aae-planner-worker
  namespace: aae
  labels:
    app: aae-planner-worker
    component: planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aae-planner-worker
  template:
    metadata:
      labels:
        app: aae-planner-worker
        component: planner
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: planner
          image: aae-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_planner_node.py"]
          envFrom:
            - configMapRef:
                name: aae-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aae-planner-hpa
  namespace: aae
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aae-planner-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
