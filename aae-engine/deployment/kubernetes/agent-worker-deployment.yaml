apiVersion: apps/v1
kind: Deployment
metadata:
  name: aae-agent-worker
  namespace: aae
  labels:
    app: aae-agent-worker
    component: agent
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aae-agent-worker
  template:
    metadata:
      labels:
        app: aae-agent-worker
        component: agent
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: agent
          image: aae-platform:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_agent_worker.py"]
          env:
            - name: AGENT_TYPE
              value: "code"
          envFrom:
            - configMapRef:
                name: aae-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aae-agent-hpa
  namespace: aae
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aae-agent-worker
  minReplicas: 4
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
