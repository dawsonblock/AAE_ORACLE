monitoring:
  prometheus:
    enabled: true
    port: 9090
    scrape_interval_s: 15
    metrics_path: "/metrics"

  grafana:
    enabled: true
    port: 3000
    dashboards_dir: "deployment/grafana/dashboards"

  opentelemetry:
    enabled: true
    exporter: "otlp"               # otlp | jaeger | zipkin | console
    endpoint: "${OTEL_ENDPOINT:-http://localhost:4317}"
    service_name: "aae-controller"
    sample_rate: 0.1               # 10% of traces

  loki:
    enabled: false
    url: "${LOKI_URL:-http://localhost:3100}"

  alerting:
    task_failure_rate_threshold: 0.20
    queue_depth_threshold: 1000
    sandbox_utilization_threshold: 0.90
    planner_latency_ms_threshold: 5000

  cost:
    track_tokens: true
    track_compute: true
    token_cost_per_1k: 0.002       # USD per 1k tokens (adjust per model)
    alert_budget_usd: 100.0        # daily budget alert threshold
