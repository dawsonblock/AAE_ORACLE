sandbox:
  backend: "docker"                # docker | local
  default_image: "python:3.11-slim"
  network_mode: "none"             # isolate by default

  pool:
    min_size: 2
    max_size: 20
    idle_timeout_s: 300

  resource_limits:
    cpu_count: 2
    memory_mb: 2048
    disk_mb: 4096
    execution_timeout_s: 300
    network_egress_kb: 0           # 0 = blocked

  artifact:
    collect_coverage: true
    collect_traces: true
    collect_logs: true
    max_artifact_mb: 100

  cleanup:
    remove_on_success: true
    remove_on_failure: false       # keep failed containers for debugging
    ttl_minutes: 60

  images:
    python: "python:3.11-slim"
    node: "node:20-slim"
    java: "eclipse-temurin:21-jdk-alpine"
    go: "golang:1.22-alpine"
    rust: "rust:1.76-slim"
